<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
      }

      body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#667eea,#764ba2);
      }

      .login-container{
        width:380px;
        background:white;
        padding:40px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
      }

      .login-container h2{
        text-align:center;
        margin-bottom:25px;
        color:#333;
      }

      .form-group{
        margin-bottom:18px;
      }

      .form-group label{
        display:block;
        margin-bottom:6px;
        color:#555;
      }

      .form-group input{
        width:100%;
        padding:12px;
        border:1px solid #ddd;
        border-radius:8px;
        outline:none;
        transition:0.3s;
      }

      .form-group input:focus{
        border-color:#667eea;
      }

      .btn-login{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#667eea;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
      }

      .btn-login:hover{
        background:#5563d6;
      }

      .link{
        text-align:center;
        margin-top:15px;
      }

      .link a{
        text-decoration:none;
        color:#667eea;
        font-weight:bold;
      }

      .error{
        color:red;
        text-align:center;
        margin-bottom:15px;
      }

      .success{
        color:green;
        text-align:center;
        margin-bottom:15px;
      }
    </style>
</head>
<body>
  <div class="login-container">
    <h2>Đăng nhập</h2>

    <div class="error" th:if="${error}">
      Sai tài khoản hoặc mật khẩu
    </div>

    <div class="success" th:if="${logout}">
      Đăng xuất thành công
    </div>

    <form th:action="@{/login_submit}" method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Nhập tên đăng nhập">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" name="password" placeholder="Nhập mật khẩu">
      </div>

      <button type="submit" class="btn-login">
        Đăng nhập
      </button>
    </form>

    <div class="link">
      Chưa có tài khoản?
      <a th:href="@{/auth}">Đăng ký</a>
    </div>
</div>
</body>
</html>
