<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .register-container{
            width:420px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border-color:#667eea;
        }

        .btn-register{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn-register:hover{
            background:#5563d6;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        .link a{
            text-decoration:none;
            color:#667eea;
            font-weight:bold;
        }

        .error{
            color:red;
            margin-bottom:10px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="register-container">

    <h2>Đăng ký tài khoản</h2>

    <form th:action="@{/register}" method="post">

        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" name="fullName" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn-register">
            Đăng ký
        </button>

    </form>

    <div class="link">
        Đã có tài khoản?
        <a th:href="@{/auth/login}">Đăng nhập</a>
    </div>

</div>

</body>
</html>
